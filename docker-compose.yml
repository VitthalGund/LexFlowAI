version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: lexflow_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: lexflow_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=lexflow_hackathon
      - USE_LOCAL_LLM=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gaganyatri/sarvam-2b-v0.5:latest
      - OPA_BASE_URL=http://opa:8181
    depends_on:
      - mongodb
      - opa
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  opa:
    image: openpolicyagent/opa:latest
    container_name: lexflow_opa
    command: ["run", "--server", "--addr=0.0.0.0:8181"]
    ports:
      - "8181:8181"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lexflow_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:

